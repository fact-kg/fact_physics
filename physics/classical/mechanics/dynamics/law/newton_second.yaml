- is:
    type: physics/equation
    as:
      - physics/equation:
          lhs:
            value: [force]
          rhs:
            value: [mass, acceleration]
- is:
    type: math/expression
- has:
    force:
      type: physics/unit/mks/force
- has:
    mass:
      type: physics/unit/mks/mass
- has:
    acceleration:
      type: physics/unit/mks/acceleration
- has:
    wikipedia_url:
      type: computer/sw/url
      value: "https://en.wikipedia.org/wiki/Newton%27s_laws_of_motion"
- has:
    expression:
      type: math/expression
      as:
        - math/expression:
            expression_str:
              value: "F = m * a"
            expression_yaml:
              value: |
                math/algebra/operation/multiply:
                  - mass
                  - acceleration
